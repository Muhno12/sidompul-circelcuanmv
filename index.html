<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cek Kuota XL & Axis</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#0d74d6;
  --bg2:#0b4fa8;
  --bg3:#06275f;

  --panel1:rgba(47,111,160,.94);
  --panel2:rgba(27,76,120,.94);

  --stroke:rgba(255,255,255,.12);
  --stroke-soft:rgba(255,255,255,.08);

  --text:#eef6ff;
  --muted:rgba(238,246,255,.74);

  --orange:#ff9f0a;
  --orange2:#ffb648;
  --blue:#1495e8;
  --blue2:#0e7fd8;

  --shadow:0 18px 45px rgba(0,0,0,.28);
  --shadow-soft:0 10px 24px rgba(0,0,0,.18);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:'Poppins',sans-serif;
  color:var(--text);
  padding:20px 14px 26px;
  background:
    radial-gradient(900px 600px at 30% 8%, rgba(145,220,255,.24), transparent 60%),
    linear-gradient(180deg, var(--bg1), var(--bg2), var(--bg3));
}

.wrap{
  max-width:430px;
  margin:0 auto;
}

.panel{
  background:linear-gradient(180deg, var(--panel1), var(--panel2));
  border:1px solid var(--stroke);
  border-radius:24px;
  box-shadow:var(--shadow);
  padding:18px 14px 14px;
  backdrop-filter: blur(8px);
}

.hTitle{
  text-align:center;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.4px;
  font-size:24px;
  line-height:1.1;
  margin:2px 0 14px;
}

.label{
  font-weight:700;
  font-size:14px;
  margin:0 0 7px;
}

.input{
  width:100%;
  padding:13px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.16);
  outline:none;
  background:rgba(255,255,255,.10);
  color:rgba(238,246,255,.97);
  font-size:13px;
  transition:.2s ease;
}
.input::placeholder{
  color:rgba(234,244,255,.52);
}
.input:focus{
  border-color:rgba(255,255,255,.28);
  background:rgba(255,255,255,.13);
  box-shadow:0 0 0 3px rgba(255,255,255,.05);
}

.btnMain{
  margin-top:12px;
  width:100%;
  border:none;
  cursor:pointer;
  padding:13px 14px;
  border-radius:14px;
  font-weight:800;
  font-size:14px;
  color:#fff;
  background:linear-gradient(180deg, var(--orange2), var(--orange));
  box-shadow:0 12px 22px rgba(255,159,10,.22);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
}
.btnMain:hover{
  transform:translateY(-1px);
}
.btnMain:active{
  transform:translateY(0);
}
.btnMain:disabled{
  opacity:.7;
  cursor:not-allowed;
}
.btnMain .ico{
  font-size:15px;
  transform:translateY(1px);
}

.row2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}
.btnSmall{
  border:none;
  cursor:pointer;
  padding:11px 10px;
  border-radius:14px;
  font-weight:700;
  font-size:13px;
  color:#eef6ff;
  background:linear-gradient(180deg, var(--blue), var(--blue2));
  box-shadow:0 10px 18px rgba(10,144,223,.18);
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  transition:transform .15s ease, box-shadow .15s ease;
}
.btnSmall:hover{
  transform:translateY(-1px);
}

.resultWrap{
  margin-top:14px;
  border-radius:16px;
  background:rgba(0,0,0,.10);
  border:1px solid var(--stroke-soft);
  overflow:hidden;
}
.resultContent{
  padding:10px;
}

.infoCard{
  border-radius:16px;
  padding:12px;
  background:linear-gradient(180deg, rgba(10,28,46,.54), rgba(7,20,35,.48));
  border:1px solid var(--stroke-soft);
  box-shadow:var(--shadow-soft);
}

.resultTitle{
  font-weight:800;
  font-size:13px;
  margin-bottom:6px;
}

.infoRow{
  display:grid;
  grid-template-columns:110px 10px 1fr;
  gap:7px;
  padding:2px 0;
  font-size:12px;
}
.infoRow .k{
  font-weight:600;
  color:rgba(238,246,255,.92);
}
.infoRow .c{
  text-align:center;
  color:rgba(238,246,255,.62);
}
.infoRow .v{
  font-weight:700;
  color:rgba(238,246,255,.99);
  word-break:break-word;
}

.hr{
  height:1px;
  background:rgba(255,255,255,.10);
  margin:10px 0 9px;
}

.volteNote{
  display:flex;
  gap:7px;
  align-items:flex-start;
  font-size:11px;
  line-height:1.45;
  color:rgba(238,246,255,.88);
}
.volteNote b{
  color:#47dd78;
}

.packList{
  margin-top:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.pkg{
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.10);
  background:rgba(0,0,0,.16);
  box-shadow:var(--shadow-soft);
}

.pkgHead{
  padding:10px 12px;
  cursor:pointer;
  user-select:none;
  background:rgba(255,255,255,.04);
  border-bottom:1px solid rgba(255,255,255,.08);
  transition:background .15s ease;
}
.pkgHead:hover{
  background:rgba(255,255,255,.06);
}

.pkgTitle{
  font-weight:800;
  font-size:13px;
  color:rgba(238,246,255,.97);
  line-height:1.35;
}

.pkgBody{
  max-height:0;
  opacity:0;
  overflow:hidden;
  transition:.24s ease;
  background:rgba(0,0,0,.08);
}
.pkg.open .pkgBody{
  max-height:2400px;
  opacity:1;
}

.benefit{
  padding:11px 12px;
  border-top:1px solid rgba(255,255,255,.05);
}
.benefit:first-child{
  border-top:none;
}

.bLine{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:flex-end;
  font-size:12px;
  color:rgba(238,246,255,.94);
  margin-bottom:7px;
}
.bName{
  font-weight:700;
}
.bVal{
  font-weight:800;
  text-align:right;
}

.bar{
  height:8px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  overflow:hidden;
}
.barRemain{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg, #30b0ff, #1d72ff);
  transition:.35s ease;
}

.mini{
  color:var(--muted);
  font-size:11px;
  margin-top:5px;
  line-height:1.45;
}

@media (max-width:420px){
  .wrap{max-width:100%}
  .panel{padding:16px 12px 12px}
  .hTitle{font-size:22px}
  .infoRow{grid-template-columns:100px 10px 1fr}
}

@media (max-width:360px){
  .hTitle{font-size:20px}
  .infoRow{grid-template-columns:90px 8px 1fr; font-size:11px}
  .row2{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="wrap">
  <div class="panel">
    <div class="hTitle">Cek Kuota<br>XL dan Axis</div>

    <div class="label">Nomor XL / AXIS</div>
    <input id="nomor" class="input" type="tel" inputmode="numeric"
           placeholder="Ex: 0878xxx / 62878xxx" autocomplete="tel">

    <button class="btnMain" id="btnCek" onclick="cekKuota()">
      <span class="ico">🔊</span>
      <span>Cek Kuota</span>
    </button>

    <div class="row2">
      <a class="btnSmall" href="https://circelcuanmv.my.id/digital/328721" target="_blank" rel="noopener noreferrer">Area Akrab</a>
      <a class="btnSmall" href="https://circelcuanmv.my.id/digital/383659" target="_blank" rel="noopener noreferrer">Area Bebas Puas</a>
    </div>

    <div class="resultWrap">
      <div class="resultContent" id="resultBox">
        <div class="infoCard">
          <div class="resultTitle">🧾 RESULT</div>
          <div class="mini">Hasil muncul setelah klik <b>Cek Kuota</b>.</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
function normalize(num){
  num = (num || '').replace(/\D/g,'');
  if(num.startsWith('0')) num = '62' + num.slice(1);
  return num;
}
function escapeHtml(s){
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}
function openPkg(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.classList.toggle("open");
}
function pickValue(obj, paths){
  for(const p of paths){
    let cur = obj;
    const keys = p.split(".");
    let ok = true;
    for(const k of keys){
      if(cur && Object.prototype.hasOwnProperty.call(cur, k)){
        cur = cur[k];
      }else{ ok = false; break; }
    }
    if(ok && cur != null && cur !== "") return cur;
  }
  return null;
}
function findVolteFallback(obj, want){
  const keys = Object.keys(obj || {});
  const w = String(want || "").toLowerCase();

  const hit = keys.find(k => {
    const s = k.toLowerCase();
    if(!s.includes("volte")) return false;
    if(w === "perangkat"){
      return s.includes("perangkat") || s.includes("device") || s.includes("hp") || s.includes("handset");
    }
    return s.includes(w);
  });

  if(!hit) return null;

  const val = obj[hit];
  if(val && typeof val === "object" && "value" in val) return val.value;
  return val;
}
function findAgeFallback(obj){
  const keys = Object.keys(obj || {});
  const hit = keys.find(k=>{
    const s = k.toLowerCase();
    return s.includes("umur") || s.includes("age") || s.includes("masa_pakai") || s.includes("masa pakai");
  });

  if(!hit) return "";
  const val = obj[hit];
  if(val && typeof val === "object" && "value" in val) return val.value;
  return val ?? "";
}
function toNumber(x){
  if(x == null) return 0;
  const s = String(x).replace(/\s/g,'').replace(/,/g,'.').replace(/[^\d.]/g,'');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}
function remainPercent(remain, total){
  if(total > 0) return Math.max(0, Math.min(100, (remain/total)*100));
  if(remain > 0) return 100;
  return 0;
}
function ynIconForce(val){
  if(val == null) return "❌";
  if(typeof val === "object" && "value" in val) val = val.value;

  const raw = String(val).trim();
  if(raw === "") return "❌";

  const s = raw.toLowerCase();

  if(
    s.includes("tidak") || s.includes("non") ||
    s.includes("not supported") || s.includes("unsupported") ||
    s.includes("unavailable") || s.includes("disable") ||
    s.includes("off") || s === "no" || s === "false" || s === "0" || s === "x"
  ) return "❌";

  if(
    s.includes("ya") || s.includes("yes") ||
    s.includes("aktif") || s.includes("sudah") ||
    s.includes("supported") || s.includes("available") ||
    s.includes("enable") || s.includes("on") ||
    s === "true" || s === "1" ||
    raw.includes("✓") || raw.includes("✔") || raw.includes("✅")
  ) return "✅";

  return "❌";
}
function dateOnly(v){
  if(!v) return "";
  const s = String(v).trim();
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso) return `${iso[3]}-${iso[2]}-${iso[1]}`;
  const dmy = s.match(/(\d{2})[\/-](\d{2})[\/-](\d{4})/);
  if(dmy) return `${dmy[1]}-${dmy[2]}-${dmy[3]}`;
  return s;
}

async function cekKuota(){
  const input = document.getElementById("nomor");
  const box   = document.getElementById("resultBox");
  const btn   = document.getElementById("btnCek");

  if(!input.value){
    box.innerHTML = `<div class="infoCard">⚠️ Nomor wajib diisi</div>`;
    return;
  }

  const msisdn = normalize(input.value);
  btn.disabled = true;
  box.innerHTML = `<div class="infoCard">⏳ Memproses...</div>`;

  const url = `https://apigw.kmsp-store.com/sidompul/v4/cek_kuota?msisdn=${msisdn}&isJSON=true&_=${Date.now()}`;

  try{
    const res = await fetch(url,{
      method:'GET',
      headers:{
        "Accept":"application/json",
        "Authorization":"Basic c2lkb21wdWxhcGk6YXBpZ3drbXNw",
        "x-api-key":"60ef29aa-a648-4668-90ae-20951ef90c55",
        "x-app-version":"4.0.0"
      }
    });

    let json;
    try{ json = await res.json(); }
    catch(_){
      box.innerHTML = `<div class="infoCard">❌ Response bukan JSON (kemungkinan diblok CORS / server error)</div>`;
      return;
    }

    if(!json?.status || !json?.data?.data_sp){
      const msg = escapeHtml(json?.message || "Gagal ambil data");
      box.innerHTML = `<div class="infoCard">❌ ${msg}</div>`;
      return;
    }

    const d = json.data.data_sp;

    const ms = json.data?.msisdn ?? msisdn;
    const tipeKartu = d?.prefix?.value ?? "";
    const jaringan  = d?.status_4g?.value ?? "";
    const verifId   = d?.dukcapil?.value ?? "";

    const umurKartu =
      pickValue(d, [
        "card_age.value",
        "umur_kartu.value",
        "age_card.value",
        "masa_pakai.value",
        "card_age",
        "umur_kartu",
        "age_card",
        "masa_pakai"
      ]) ?? findAgeFallback(d);

    const masaAktif = dateOnly(d?.active_period?.value ?? "");
    const masaTengg = dateOnly(d?.grace_period?.value ?? d?.masa_tenggang?.value ?? "");

    const volteAreaVal =
      pickValue(d, [
        "volte_area.value","volteArea.value","volte_area","volteArea",
        "volte_area_status.value","volteAreaStatus.value","volte_area_status","volteAreaStatus"
      ]) ?? findVolteFallback(d, "area");

    const volteSimVal =
      pickValue(d, [
        "volte_simcard.value","volteSimcard.value","volte_sim.value","volteSim.value",
        "volte_simcard","volteSimcard","volte_sim","volteSim",
        "volte_sim_status.value","volteSimStatus.value","volte_sim_status","volteSimStatus"
      ]) ?? findVolteFallback(d, "simcard");

    const volteDevVal =
      pickValue(d, [
        "volte_device.value","voltePerangkat.value","volteDevice.value",
        "volte_device","voltePerangkat","volteDevice",
        "volte_device_status.value","volteDeviceStatus.value","volte_device_status","volteDeviceStatus"
      ]) ?? findVolteFallback(d, "perangkat");

    let html = `
      <div class="infoCard">
        <div class="resultTitle">🧾 RESULT</div>
        <div class="infoRow"><div class="k">MSISDN</div><div class="c">:</div><div class="v">${escapeHtml(ms)}</div></div>
        <div class="infoRow"><div class="k">Tipe Kartu</div><div class="c">:</div><div class="v">${escapeHtml(tipeKartu)}</div></div>
        <div class="infoRow"><div class="k">Jaringan</div><div class="c">:</div><div class="v">${escapeHtml(jaringan)}</div></div>
        <div class="infoRow"><div class="k">Verif ID</div><div class="c">:</div><div class="v">${escapeHtml(verifId)}</div></div>
        <div class="infoRow"><div class="k">Umur Kartu</div><div class="c">:</div><div class="v">${escapeHtml(umurKartu)}</div></div>
        <div class="infoRow"><div class="k">Masa Aktif</div><div class="c">:</div><div class="v">${escapeHtml(masaAktif)}</div></div>
        <div class="infoRow"><div class="k">Masa Tenggang</div><div class="c">:</div><div class="v">${escapeHtml(masaTengg)}</div></div>
        <div class="infoRow"><div class="k">Volte Area</div><div class="c">:</div><div class="v">${ynIconForce(volteAreaVal)}</div></div>
        <div class="infoRow"><div class="k">Volte Simcard</div><div class="c">:</div><div class="v">${ynIconForce(volteSimVal)}</div></div>
        <div class="infoRow"><div class="k">Volte Device</div><div class="c">:</div><div class="v">${ynIconForce(volteDevVal)}</div></div>

        <div class="hr"></div>
        <div class="volteNote">
          <div>📶</div>
          <div><b>VoLTE</b> adalah panggilan telepon yang tetap bisa internetan saat menelpon.</div>
        </div>
      </div>
    `;

    const groups = d?.quotas?.value || [];
    const flatPkgs = [];
    if(Array.isArray(groups)){
      groups.forEach(g => (g || []).forEach(p => flatPkgs.push(p)));
    }

    if(flatPkgs.length){
      html += `<div class="packList">`;

      let idx = 0;
      flatPkgs.forEach(pkg=>{
        const id = `pkg_${idx++}`;
        const pname = pkg?.packages?.name ?? "Paket";
        const exp = dateOnly(pkg?.packages?.expDate ?? "");

        html += `
          <div class="pkg" id="${id}">
            <div class="pkgHead" onclick="openPkg('${id}')">
              <div class="pkgTitle">${escapeHtml(exp)} | ${escapeHtml(pname)}</div>
            </div>
            <div class="pkgBody">
        `;

        const benefits = pkg?.benefits || [];
        if(!benefits.length){
          html += `<div class="benefit" style="color:rgba(238,246,255,.75);font-size:11px;">Tidak ada detail kuota.</div>`;
        }else{
          benefits.forEach(b=>{
            const totalN  = toNumber(b?.quota);
            const remainN = toNumber(b?.remaining);
            const p = remainPercent(remainN, totalN);

            html += `
              <div class="benefit">
                <div class="bLine">
                  <div class="bName">${escapeHtml(b?.bname ?? "Kuota")}</div>
                  <div class="bVal">${escapeHtml(b?.remaining ?? "0")} / ${escapeHtml(b?.quota ?? "0")}</div>
                </div>
                <div class="bar"><div class="barRemain" style="width:${p}%"></div></div>
              </div>
            `;
          });
        }

        html += `</div></div>`;
      });

      html += `</div>`;
    }else{
      html += `<div class="infoCard" style="margin-top:10px;">Tidak ada data paket ditemukan.</div>`;
    }

    box.innerHTML = html;

  }catch(e){
    console.error(e);
    box.innerHTML = `<div class="infoCard">⚠️ Koneksi gagal / diblokir (cek internet atau CORS)</div>`;
  }finally{
    btn.disabled = false;
  }
}
</script>
</body>
</html>
